apiVersion: platform.confluent.io/v1beta1
kind: FlinkApplication
metadata:
  name: flink-kafka-autoscale-demo
  namespace: flink
  labels:
    app: flink-kafka-demo
    component: streaming
    platform: confluent
spec:
  # Reference to FlinkEnvironment - REQUIRED
  flinkEnvironment: default-flink-env

  # Confluent Metadata Framework REST class reference
  cmfRestClassRef:
    name: cmf-rest-class
    namespace: flink

  # Flink image matching the original deployment
  image: quay.io/osowski/flink-autoscale-job:v0.2.0-avro
  imagePullPolicy: IfNotPresent

  # Flink version
  flinkVersion: v2_1

  # Deployment mode (native or standalone)
  #mode: native

  # Service account for RBAC
  serviceAccount: flink

  # Flink configuration - OPTIMIZED FOR FAST AUTOSCALING DEMO
  flinkConfiguration:
    # Task slots per TaskManager
    taskmanager.numberOfTaskSlots: "1"

    # TaskManager memory configuration
    #taskmanager.memory.process.size: "1024m"
    #taskmanager.memory.managed.fraction: "0.4"

    # AGGRESSIVE Autoscaler configuration - Optimized for demo visibility
    job.autoscaler.enabled: "true"
    job.autoscaler.utilization.target: "0.3"            # 30% - aggressive for demo purposes
    job.autoscaler.utilization.min: "0.1"               # Force scale-down below 10%
    job.autoscaler.utilization.max: "0.5"               # Force scale-up above 50%
    job.autoscaler.metrics.window: "5m"                 # Must be > reconcile interval (60s default)
    job.autoscaler.stabilization.interval: "1m"         # Quick decisions after metrics collected
    job.autoscaler.scale-down.interval: "10m"           # Cooldown after any scaling before allowing scale-down
    job.autoscaler.vertex.max-parallelism: "8"
    job.autoscaler.scaling.effectiveness.detection.enabled: "false" # RECOMMENDED DISABLED FOR DEMOS
    #pipeline.max-parallelism: "32" ## Previously 16 per Claude recommendation; setting to 4 to match Jeremy's setting

    # Faster checkpointing for quicker scaling
    #execution.checkpointing.interval: "5s"
    #execution.checkpointing.mode: "EXACTLY_ONCE"
    #execution.checkpointing.min-pause: "2s"

    ## State backend configuration
    #state.backend: "rocksdb"
    #state.checkpoints.dir: "file:///tmp/flink-checkpoints"
    #state.savepoints.dir: "file:///tmp/flink-savepoints"

    # Restart strategy - Flink v2 format
    restart-strategy.type: "fixed-delay"
    restart-strategy.fixed-delay.attempts: "3"
    restart-strategy.fixed-delay.delay: "5s"

    # Metrics - Prometheus
    metrics.reporter.prom.factory.class: "org.apache.flink.metrics.prometheus.PrometheusReporterFactory"
    metrics.reporter.prom.port: "9249-9250"

    # Schema Registry configuration for Avro serialization/deserialization
    schema.registry.url: "http://schemaregistry.kafka.svc.cluster.local:8081"
    schema.registry.bearer.auth.credentials.source: "OAUTHBEARER"
    schema.registry.bearer.auth.issuer.endpoint.url: "http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token"
    schema.registry.bearer.auth.client.id: "flink-app"
    schema.registry.bearer.auth.client.secret: "flink-app-secret"
    schema.registry.bearer.auth.scope: ""
    schema.registry.bearer.auth.logical.cluster: ""
    schema.registry.bearer.auth.identity.pool.id: ""

    # Kafka OAuth configuration (properties passed to Kafka clients)
    kafka.bootstrap.servers: "kafka.kafka.svc.cluster.local:9071"
    kafka.input.topic: "colors-input"
    kafka.output.topic: "colors-output"
    kafka.consumer.group.id: "flink-consumer-group-beta"
    kafka.security.protocol: "SASL_PLAINTEXT"
    kafka.sasl.mechanism: "OAUTHBEARER"
    kafka.sasl.jaas.config: "org.apache.kafka.common.security.oauthbearer.OAuthBearerLoginModule required clientId='flink-app' clientSecret='flink-app-secret';"
    kafka.sasl.login.callback.handler.class: "org.apache.kafka.common.security.oauthbearer.secured.OAuthBearerLoginCallbackHandler"
    kafka.sasl.oauthbearer.token.endpoint.url: "http://keycloak.keycloak.svc.cluster.local:8080/realms/confluent/protocol/openid-connect/token"

  # JobManager configuration
  jobManager:
    replicas: 1
    resource:
      memory: "1024m"
      cpu: "1000m"

  # TaskManager configuration - REDUCED CPU for faster backpressure
  taskManager:
    #replicas: 1  # Initial replicas - autoscaler will scale up quickly
    resource:
      memory: "1024m"     # Safe memory allocation (minimum ~700m needed for Flink internals)
      cpu: "1000m"         # LOW CPU is the key constraint - creates backpressure

  # Job configuration
  job:
    jarURI: local:///opt/flink/usrlib/kafka-flink-job.jar
    parallelism: 1
    state: running
    upgradeMode: stateless
    allowNonRestoredState: true

  # Pod template for environment variables and customization
  podTemplate:
    spec:
      containers:
        - name: flink-main-container
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.kafka.svc.cluster.local:9071"
            - name: KAFKA_TOPIC
              value: "colors-input"
            - name: KAFKA_OUTPUT_TOPIC
              value: "colors-output"
            - name: KAFKA_CONSUMER_GROUP
              value: "flink-consumer-group-beta"
            - name: SCHEMA_REGISTRY_URL
              value: "http://schemaregistry.kafka.svc.cluster.local:8081"