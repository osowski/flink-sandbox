---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: autoscale-demo
  namespace: kafka
spec:
  kafkaClusterRef:
    name: kafka
    namespace: kafka

  replicas: 3
  partitionCount: 21

  configs:
    min.insync.replicas: "2"
    # Retention - 1 day / 1 TB
    retention.ms: "86400000"
    retention.bytes: "1099511627776"

---
apiVersion: platform.confluent.io/v1beta1
kind: KafkaTopic
metadata:
  name: autoscale-demo-out
  namespace: kafka
spec:
  kafkaClusterRef:
    name: kafka
    namespace: kafka

  replicas: 3
  partitionCount: 21

  configs:
    min.insync.replicas: "2"
    # Retention - 1 day / 1 TB
    retention.ms: "86400000"
    retention.bytes: "1099511627776"
